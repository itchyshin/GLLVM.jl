# Standalone project for the GLLVM.jl ↔ R gllvmTMB parity suite.
#
# This project is INTENTIONALLY SEPARATE from test/Project.toml.
# RCall requires a working R installation and cannot be precompiled on CI
# runners that lack R. Adding it here — not to test/Project.toml — means
# the default test suite (`julia --project=. test/runtests.jl`) never
# touches this project and will never break because of R absence.
#
# GLLVM itself is NOT listed here; it is dev-added at runtime by
# runparity.jl via `Pkg.develop(path="../..")`.

[deps]
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
RCall = "6f49c342-dc21-5d91-9882-a32aef131414"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"
Statistics = "10745b16-79ce-11e8-11f9-7d13ad32a3b2"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[compat]
RCall = "0.13, 0.14"
julia = "1.10"
